<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AESIR Programming WebApp{% endblock %}</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <link rel="stylesheet" href="{{ asset_url('css/main.css') }}">
    <link rel="stylesheet" href="{{ asset_url('css/components.css') }}">
    <link rel="stylesheet" href="{{ asset_url('css/print.css') }}" media="print">
</head>
<body class="app-shell">
    {% if not hide_nav %}
    <nav class="navbar navbar-expand-lg aesir-nav border-bottom mb-4 no-print">
        <div class="container container-xl">
            <a class="navbar-brand fw-semibold" href="{{ url_for('main.home') }}">AESIR</a>
            <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNav"
                aria-controls="mainNav"
                aria-expanded="false"
                aria-label="Mostrar navegacion"
            >
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('main.home') }}">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('days.today') }}">Hoy</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('weeks.current_week') }}">Semana</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('weeks.calendar') }}">Calendario</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('blocks.current_block') }}">Bloque</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('library.library_index') }}">Biblioteca</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('library.glossary_index') }}">Glosario</a></li>
                </ul>
            </div>
        </div>
    </nav>
    {% endif %}

    <main class="container container-xl pb-5 {% if export_mode %}export-shell{% endif %}">
        {% block content %}{% endblock %}
    </main>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"
    ></script>
</body>
</html>
